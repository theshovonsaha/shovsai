<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Frameworks Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #fff; --primary: #00ff85; }
        body { 
            background: #000; color: var(--text); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .v8-card { background: #050505; border: 1px solid #111; border-radius: 12px; transition: all 0.3s ease; }
        .v8-card:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,255,133,0.1); }
    </style>
</head>
<body class="p-6">
    <html lang="en"><head><title>AI Frameworks Comparison</title><style>body { background-color: #000; } .chart { width: 100%; height: 400px; } .glassmorphism { background: rgba(255, 255, 255, 0.1); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2); backdrop-filter: blur(5px); }</style></head><body><div class="glassmorphism"><canvas class="chart"></canvas></div><section id="my-platform"><h2>My Platform</h2><div class="placeholder"></div></section><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script>const ctx = document.querySelector('.chart').getContext('2d');const chart = new Chart(ctx, {type: 'radar',data: {labels: ['Autonomy', 'Safety', 'Extensibility', 'Multi-model Support'],datasets: [{label: 'FrameworkA', data: [8, 9, 7, 6],backgroundColor: 'rgba(255, 99, 132, 0.2)',borderColor: 'rgba(255, 99, 132, 1)',borderWidth: 1},{label: 'FrameworkB', data: [7, 8, 9, 8],backgroundColor: 'rgba(54, 162, 235, 0.2)',borderColor: 'rgba(54, 162, 235, 1)',borderWidth: 1},{label: 'FrameworkC', data: [9, 7, 8, 9],backgroundColor: 'rgba(255, 206, 86, 0.2)',borderColor: 'rgba(255, 206, 86, 1)',borderWidth: 1}]},options: {}});</script></body></html>
    <script>lucide.createIcons();</script>
</body>
</html>
