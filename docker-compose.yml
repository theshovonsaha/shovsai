version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - ./agents.db:/app/agents.db
      - ./chroma_db:/app/chroma_db
    networks:
      - agent-network
    depends_on:
      - searxng

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    networks:
      - agent-network

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
